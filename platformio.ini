[env:esp32-s3-devkitc-1]
platform   = espressif32
board      = esp32-s3-devkitc-1
framework  = arduino
monitor_speed = 115200
monitor_port = COM14
monitor_filters = esp32_exception_decoder

; ── Flash / Memory ────────────────────────────────────────────────────────────
board_build.flash_mode          = qio
board_build.arduino.memory_type = qio_opi   ; activate 8 MB Octal PSRAM
board_upload.flash_size         = 8MB
board_build.partitions          = custom_partitions.csv

; ── USB (native CDC on ESP32-S3) ──────────────────────────────────────────────
build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=0  ; Serial -> hardware UART GPIO43/44

  ; ── GPIO pin assignments (override in your own env if needed) ──────────────
  -D NEOPIXEL_PIN=38
  -D RELAY_PIN=1
  -D GPIO1_PIN=2
  -D GPIO2_PIN=3
  -D GPIO3_PIN=4
  -D GPIO4_PIN=5

  ; ── Version strings ────────────────────────────────────────────────────────
  -D FW_VERSION='"0.1.0"'
  -D FW_DATE='"2026-06-10"'

  ; Hardware WDT disabled

  ; ── LittleFS ───────────────────────────────────────────────────────────────
  -D USE_LittleFS=true

  ; ── ArduinoJson ────────────────────────────────────────────────────────────
  -D ARDUINOJSON_ENABLE_ARDUINO_STRING=1

; ── Libraries ─────────────────────────────────────────────────────────────────
lib_deps =
  ; Web server — ESP32Async is the maintained fork (mathieucarbou name not in registry)
  ESP32Async/ESPAsyncWebServer @ ^3.3.1
  ESP32Async/AsyncTCP          @ ^3.2.0

  ; MQTT (async)
  knolleary/PubSubClient        @ ^2.8.0

  ; NeoPixel / RGB LED
  fastled/FastLED               @ ^3.7.0

  ; Protocol Buffers (lightweight)
  nanopb/Nanopb                 @ ^0.4.8

  ; JSON
  bblanchon/ArduinoJson         @ ^7.0.4


; ── Build scripts ─────────────────────────────────────────────────────────────
extra_scripts =
  pre:version_inc.py

; ── Filesystem upload ─────────────────────────────────────────────────────────
board_build.filesystem = littlefs

; ── Upload speed ──────────────────────────────────────────────────────────────
upload_speed = 921600
upload_port = COM14

; ── Debug build (uncomment to enable) ────────────────────────────────────────
; [env:esp32-s3-devkitc-1-debug]
; extends = esp32-s3-devkitc-1
; build_type = debug
; build_flags =
;   ${esp32-s3-devkitc-1.build_flags}
;   -D CORE_DEBUG_LEVEL=4
