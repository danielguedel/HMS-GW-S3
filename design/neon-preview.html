<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Neon Preview — HMS-GW-S3</title>
<style>
  :root {
    --bg:        #06060a;
    --surface:   #0d0d16;
    --border:    #232336;
    --text:      #e8e8f0;
    --text-dim:  #8a8aa0;
    --pink:      #ff2bd6;
    --cyan:      #2bf0ff;
    --purple:    #b04bff;
    --lime:      #c8ff2b;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at 50% -10%, #1a0f2e 0%, var(--bg) 55%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 64px;
  }

  header { text-align: center; margin-bottom: 40px; }

  h1 {
    margin: 0;
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 800;
    letter-spacing: 1px;
    color: #fff;
    text-shadow:
      0 0 6px var(--pink),
      0 0 18px var(--pink),
      0 0 42px rgba(255, 43, 214, .55);
  }

  header p {
    margin: 10px 0 0;
    color: var(--text-dim);
    font-size: 14px;
    letter-spacing: .5px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 20px;
    width: 100%;
    max-width: 760px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    position: relative;
    overflow: hidden;
    transition: transform .25s ease, box-shadow .25s ease;
  }

  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(135deg, var(--glow), transparent 60%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: .8;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 24px -4px var(--glow), 0 0 60px -20px var(--glow);
  }

  .card .label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .card .value {
    font-size: 34px;
    font-weight: 700;
    color: var(--glow);
    text-shadow: 0 0 10px var(--glow), 0 0 28px color-mix(in srgb, var(--glow) 60%, transparent);
    line-height: 1;
  }

  .card .unit { font-size: 16px; color: var(--text-dim); margin-left: 4px; }
  .card .sub  { margin-top: 10px; font-size: 12px; color: var(--text-dim); }

  .card.grid-p { --glow: var(--cyan); }
  .card.pv1    { --glow: var(--pink); }
  .card.temp   { --glow: var(--purple); }

  .actions { margin-top: 40px; }

  button {
    font: inherit;
    font-weight: 600;
    font-size: 14px;
    color: #fff;
    background: transparent;
    border: 1.5px solid var(--lime);
    border-radius: 999px;
    padding: 12px 28px;
    cursor: pointer;
    box-shadow: 0 0 8px -2px var(--lime);
    transition: box-shadow .2s ease, background-color .2s ease, transform .15s ease;
  }

  button:hover {
    background: rgba(200, 255, 43, .08);
    box-shadow: 0 0 16px -2px var(--lime), 0 0 40px -10px var(--lime);
  }

  button:active { transform: scale(.97); }

  @media (prefers-reduced-motion: reduce) {
    .card, button { transition: none; }
  }
</style>
</head>
<body>

  <header>
    <h1>NEON FLOW</h1>
    <p>Style preview only — placeholder data, not connected to the gateway</p>
  </header>

  <div class="grid">
    <div class="card grid-p">
      <div class="label">Grid Power</div>
      <div class="value">576<span class="unit">W</span></div>
      <div class="sub">241.2 V · 2.39 A</div>
    </div>
    <div class="card pv1">
      <div class="label">PV1</div>
      <div class="value">321<span class="unit">W</span></div>
      <div class="sub">25.7 V · 12.51 A</div>
    </div>
    <div class="card temp">
      <div class="label">Inverter Temp</div>
      <div class="value">43<span class="unit">°C</span></div>
      <div class="sub">power limit 100%</div>
    </div>
  </div>

  <div class="actions">
    <button type="button">Apply Settings</button>
  </div>

</body>
</html>
