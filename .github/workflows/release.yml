name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (z.B. 0.2.1)'
        required: true
        default: '0.2.0'
      notes:
        description: 'Release Notes (optional)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e esp32-s3-devkitc-1

      # version_inc.py (extra_scripts = pre:...) increments include/buildnumber.txt
      # on EVERY `pio run` invocation, including the buildfs step below. Capture the
      # number right here, immediately after the firmware build, so it matches what
      # is actually compiled into firmware.bin -  not whatever buildfs bumps it to
      # afterward (it has no compiled BUILD_NUMBER of its own, but used to throw the
      # manifest/tag one version ahead of the real firmware -  see commit history
      # around 2026-06-17 for the resulting OTA-revert false alarm).
      - name: Read build number
        id: meta
        run: |
          BUILD=$(cat include/buildnumber.txt)
          echo "build=${BUILD}" >> $GITHUB_OUTPUT
          echo "tag=build-${BUILD}" >> $GITHUB_OUTPUT
          echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT

      - name: Build filesystem image
        run: pio run -e esp32-s3-devkitc-1 -t buildfs

      - name: Pin buildnumber.txt to the firmware's actual build number
        run: echo "${{ steps.meta.outputs.build }}" > include/buildnumber.txt

      - name: Compute MD5 checksums
        id: md5
        run: |
          FW_MD5=$(md5sum .pio/build/esp32-s3-devkitc-1/firmware.bin | cut -d' ' -f1)
          FS_MD5=$(md5sum .pio/build/esp32-s3-devkitc-1/littlefs.bin | cut -d' ' -f1)
          echo "fw_md5=${FW_MD5}" >> $GITHUB_OUTPUT
          echo "fs_md5=${FS_MD5}" >> $GITHUB_OUTPUT

      - name: Update manifest.json
        run: |
          cat > release/manifest.json << EOF
          {
            "version": "${{ steps.meta.outputs.version }}",
            "buildNumber": ${{ steps.meta.outputs.build }},
            "url": "https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/firmware.bin",
            "fs_url": "https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/littlefs.bin",
            "md5": "${{ steps.md5.outputs.fw_md5 }}",
            "fs_md5": "${{ steps.md5.outputs.fs_md5 }}",
            "notes": "${{ github.event.inputs.notes }}"
          }
          EOF

      - name: Commit manifest + buildnumber
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add release/manifest.json include/buildnumber.txt
          git commit -m "release: v${{ steps.meta.outputs.version }} build ${{ steps.meta.outputs.build }}" || echo "nothing to commit"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: v${{ steps.meta.outputs.version }} (Build ${{ steps.meta.outputs.build }})
          body: ${{ github.event.inputs.notes }}
          files: |
            .pio/build/esp32-s3-devkitc-1/firmware.bin
            .pio/build/esp32-s3-devkitc-1/littlefs.bin
          make_latest: true
